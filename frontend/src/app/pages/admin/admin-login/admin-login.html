<div class="login-wrap">
  <div class="login-card">

    <div class="login-brand">
      <div class="login-logo">TR</div>
      <p class="login-brand-name">Panel de administración</p>
    </div>

    <h2>Acceder</h2>
    <p class="login-sub">Introduce tus credenciales para continuar</p>

    <form (ngSubmit)="submit()" class="login-form">
      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput [(ngModel)]="email" name="email" type="email" required autocomplete="email" />
      </mat-form-field>

      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="full-width">
        <mat-label>Contraseña</mat-label>
        <input matInput [(ngModel)]="password" name="password" type="password" required autocomplete="current-password" />
      </mat-form-field>

      @if (error) {
        <p class="login-error">{{ error }}</p>
      }

      <button type="submit" class="btn-login">Entrar</button>
    </form>

  </div>
</div>
